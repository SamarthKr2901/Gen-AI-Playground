<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Windows TX — Get a Free Quote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1565C0;
    --blue-dark: #0D47A1;
    --blue-light: #E3F2FD;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2e8f0;
    --error: #dc2626;
    --success: #16a34a;
    --white: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f4fd 50%, #f0f9ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(21, 101, 192, 0.12), 0 8px 20px rgba(0,0,0,0.06);
    width: 100%;
    max-width: 560px;
    overflow: hidden;
  }

  .card-header {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 40px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    position: relative;
    z-index: 1;
  }

  .card-body { padding: 40px; }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .form-desc {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  label span { color: var(--error); margin-left: 2px; }

  input, select, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fafbff;
    transition: all 0.2s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--blue);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.08);
  }

  input.error, select.error, textarea.error { border-color: var(--error); }

  textarea { resize: vertical; min-height: 90px; }

  .error-msg {
    font-size: 12px;
    color: var(--error);
    margin-top: 4px;
    display: none;
  }

  .error-msg.show { display: block; }

  .btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(21, 101, 192, 0.35); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }

  .alert.error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
  .alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }
  .alert.show { display: block; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">Apex Windows TX</div>
    <div class="subtitle">Window Service Experts — Dallas-Fort Worth</div>
  </div>
  <div class="card-body">
    <h2 class="form-title">Get a Free Quote</h2>
    <p class="form-desc">Tell us about your window issue and we'll prepare a personalised estimate within 1 business day.</p>

    <div class="alert error" id="alertError"></div>
    <div class="alert success" id="alertSuccess"></div>

    <form id="leadForm" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label>First Name <span>*</span></label>
          <input type="text" id="firstName" placeholder="John">
          <div class="error-msg" id="firstNameErr">Required</div>
        </div>
        <div class="form-group">
          <label>Last Name <span>*</span></label>
          <input type="text" id="lastName" placeholder="Smith">
          <div class="error-msg" id="lastNameErr">Required</div>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address <span>*</span></label>
        <input type="email" id="email" placeholder="john@email.com">
        <div class="error-msg" id="emailErr">Valid email required</div>
      </div>

      <div class="form-group">
        <label>Phone Number <span>*</span></label>
        <input type="tel" id="phone" placeholder="214-555-0192">
        <div class="error-msg" id="phoneErr">Required</div>
      </div>

      <div class="form-group">
        <label>Street Address <span>*</span></label>
        <input type="text" id="streetAddress" placeholder="123 Oak Street">
        <div class="error-msg" id="streetAddressErr">Required</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>City <span>*</span></label>
          <input type="text" id="city" placeholder="Frisco">
          <div class="error-msg" id="cityErr">Required</div>
        </div>
        <div class="form-group">
          <label>Number of Windows <span>*</span></label>
          <input type="number" id="numWindows" placeholder="3" min="1" max="10">
          <div class="error-msg" id="numWindowsErr">Required (max 10)</div>
        </div>
      </div>

      <div class="form-group">
        <label>Describe Your Issue <span>*</span></label>
        <textarea id="issueDescription" placeholder="e.g. Three foggy windows in living room, one cracked in kitchen..."></textarea>
        <div class="error-msg" id="issueDescriptionErr">Required</div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Get My Free Quote →</span>
      </button>
    </form>
  </div>
</div>

<script>
const N8N_WEBHOOK = 'https://vmi3106842.contaboserver.net/webhook/apex-lead-v2';

function val(id) { return document.getElementById(id).value.trim(); }
function showErr(id, show) {
  document.getElementById(id).classList[show ? 'add' : 'remove']('error');
  document.getElementById(id + 'Err').classList[show ? 'add' : 'remove']('show');
}

function validate() {
  let ok = true;
  const fields = ['firstName','lastName','streetAddress','city','issueDescription','phone'];
  fields.forEach(f => { const v = !val(f); showErr(f, v); if(v) ok = false; });

  const email = val('email');
  const emailInvalid = !email || !email.includes('@');
  showErr('email', emailInvalid);
  if(emailInvalid) ok = false;

  const nw = val('numWindows');
  const nwInvalid = !nw || parseInt(nw) < 1 || parseInt(nw) > 10;
  showErr('numWindows', nwInvalid);
  if(nwInvalid) ok = false;

  return ok;
}

document.getElementById('leadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!validate()) return;

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const alertError = document.getElementById('alertError');
  const alertSuccess = document.getElementById('alertSuccess');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  btnText.textContent = 'Submitting...';
  alertError.classList.remove('show');

  const payload = {
    name: val('firstName') + ' ' + val('lastName'),
    phone: val('phone'),
    email: val('email'),
    address: val('streetAddress') + ', ' + val('city') + ', TX',
    issue_description: val('issueDescription'),
    num_windows: val('numWindows')
  };

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      alertSuccess.textContent = '✅ Thank you! Your request has been received. We\'ll prepare your estimate within 1 business day.';
      alertSuccess.classList.add('show');
      document.getElementById('leadForm').style.display = 'none';
    } else {
      throw new Error('Submission failed. Please try again.');
    }
  } catch (err) {
    alertError.textContent = '❌ ' + (err.message || 'Something went wrong. Please try again.');
    alertError.classList.add('show');
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Get My Free Quote →';
  }
});
</script>
</body>
</html>
